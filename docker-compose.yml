name: disaster-management

services:
  backend:
    build:
      context: ./backend
    container_name: disaster-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/disaster_management.db
    volumes:
      - disaster-data:/app/data
      - disaster-uploads:/app/uploads
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.disaster-backend.loadbalancer.server.port=8000
      - traefik.http.routers.disaster-backend-web.rule=Host(`api.disaster.shopivell.com`)
      - traefik.http.routers.disaster-backend-web.entrypoints=web
      - traefik.http.routers.disaster-backend-web.middlewares=redirect-to-https@file
      - traefik.http.routers.disaster-backend-web.service=disaster-backend
      - traefik.http.routers.disaster-backend-websecure.rule=Host(`api.disaster.shopivell.com`)
      - traefik.http.routers.disaster-backend-websecure.entrypoints=websecure
      - traefik.http.routers.disaster-backend-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.disaster-backend-websecure.service=disaster-backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://api.disaster.shopivell.com
        VITE_WS_URL: wss://api.disaster.shopivell.com/ws
        VITE_AUTHORITY_URL: https://admin.disaster.shopivell.com
    container_name: disaster-frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.disaster-frontend.loadbalancer.server.port=80
      - traefik.http.routers.disaster-frontend-web.rule=Host(`disaster.shopivell.com`)
      - traefik.http.routers.disaster-frontend-web.entrypoints=web
      - traefik.http.routers.disaster-frontend-web.middlewares=redirect-to-https@file
      - traefik.http.routers.disaster-frontend-web.service=disaster-frontend
      - traefik.http.routers.disaster-frontend-websecure.rule=Host(`disaster.shopivell.com`)
      - traefik.http.routers.disaster-frontend-websecure.entrypoints=websecure
      - traefik.http.routers.disaster-frontend-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.disaster-frontend-websecure.service=disaster-frontend

  authority:
    build:
      context: ./authority
      args:
        VITE_API_BASE_URL: https://api.disaster.shopivell.com
        VITE_WS_URL: wss://api.disaster.shopivell.com/ws
        VITE_PUBLIC_URL: https://disaster.shopivell.com
    container_name: disaster-authority
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.disaster-authority.loadbalancer.server.port=80
      - traefik.http.routers.disaster-authority-web.rule=Host(`admin.disaster.shopivell.com`)
      - traefik.http.routers.disaster-authority-web.entrypoints=web
      - traefik.http.routers.disaster-authority-web.middlewares=redirect-to-https@file
      - traefik.http.routers.disaster-authority-web.service=disaster-authority
      - traefik.http.routers.disaster-authority-websecure.rule=Host(`admin.disaster.shopivell.com`)
      - traefik.http.routers.disaster-authority-websecure.entrypoints=websecure
      - traefik.http.routers.disaster-authority-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.disaster-authority-websecure.service=disaster-authority

volumes:
  disaster-data:
  disaster-uploads:

networks:
  dokploy-network:
    external: true
